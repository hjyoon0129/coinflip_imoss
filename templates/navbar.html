{% load static %}

<style>
    .navbar-dark .navbar-nav .nav-link.logout-btn {
        background-color: #FFC107;
        font-weight: bold;
        color: black !important;
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        line-height: 1.2;
        display: inline-block;
        text-decoration: none;
    }

    .navbar-dark .navbar-nav .nav-link.google-btn {
        background-color: #ffffff;
        color: #222 !important;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px;
        padding: 8px 14px;
        line-height: 1.2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        font-weight: 600;
    }

    .navbar-dark .navbar-nav .nav-link.google-btn:hover {
        background-color: #f3f3f3;
        color: #111 !important;
    }

    .navbar-dark .navbar-nav .nav-link.signup-btn {
        background-color: transparent;
        color: #fff !important;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px;
        padding: 8px 14px;
        line-height: 1.2;
        display: inline-block;
        text-decoration: none;
        font-weight: 500;
    }

    .navbar-dark .navbar-nav .nav-link.signup-btn:hover {
        background-color: rgba(255,255,255,0.08);
    }

    .navbar-nav {
        padding: 8px 12px;
        gap: 8px;
        align-items: center;
    }

    .navbar-nav li {
        list-style: none;
    }

    .navbar-nav li:hover {
        background-color: grey;
        border-radius: 4px;
    }

    .navbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        white-space: nowrap;
        text-decoration: none;
    }

    .brand-text-wrap {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
    }

    .brand-main-text {
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
    }

    .impossible-text {
        color: #FFA500;
        font-weight: normal;
        font-size: 0.78em;
        margin-top: 2px;
        display: block;
    }

    .logout-form {
        margin: 0;
    }

    .logout-form button {
        cursor: pointer;
    }

    .google-icon {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
    }

    @media screen and (max-width: 991.98px) {
        .navbar-nav {
            display: flex;
            padding: 12px 0;
            text-align: left;
            width: 100%;
            gap: 10px;
        }

        .navbar-nav li {
            width: 100%;
        }

        .navbar-nav li:hover {
            background-color: grey;
            border-radius: 4px;
            width: 100%;
        }

        .navbar-dark .navbar-nav .nav-link.google-btn,
        .navbar-dark .navbar-nav .nav-link.signup-btn,
        .navbar-dark .navbar-nav .nav-link.logout-btn {
            width: 100%;
            justify-content: center;
            text-align: center;
        }

        .logout-form {
            width: 100%;
        }

        .logout-form button {
            width: 100%;
        }

        .navbar-brand {
            max-width: calc(100% - 60px);
        }

        .brand-main-text {
            font-size: 0.95rem;
        }

        .impossible-text {
            font-size: 0.72em;
        }
    }
</style>

<script src="https://kit.fontawesome.com/ccb1843f6b.js" crossorigin="anonymous"></script>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'main:home' %}">
            <img src="{% static 'question_images/pyconverter_logo.png' %}" alt="PyConverter 로고" style="width: 30px; height: 30px; object-fit: contain;">
            <span class="brand-text-wrap">
                <span class="brand-main-text">PyConverter</span>
                <span class="impossible-text">Impossible is Nothing</span>
            </span>
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
            <ul class="navbar-nav mb-2 mb-lg-0">

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <form action="{% url 'account_logout' %}" method="post" class="logout-form">
                            {% csrf_token %}
                            <button type="submit" class="nav-link logout-btn">
                                {{ user.username|default:user.email }} (Log out)
                            </button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link google-btn" href="/accounts/google/login/">
                            <svg class="google-icon" viewBox="0 0 48 48" aria-hidden="true">
                                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
                                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                                <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.6 39.5 16.3 44 24 44z"/>
                                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.6-6.3 7.1l6.3 5.2C39.2 36.7 44 31 44 24c0-1.3-.1-2.4-.4-3.5z"/>
                            </svg>
                            Sign in with Google
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link signup-btn" href="/accounts/google/login/">
                            Sign up
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
